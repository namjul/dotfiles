experimental_monorepo_root = true

[env]
FIG_IDENTITY = "${FIG_IDENTITY:-namjul}"

[monorepo]
config_roots = [
  "aspects/*",
]

[settings]
sops.rops = false
experimental = true
env_shell_expand = true

[tools]
sops = "latest"
age = "latest"
ghq = "latest"
deno = "latest"
gomplate = "latest"

[tasks."fig:test"]
description = "Run fig tests"
run = "deno test -A"

[tasks."fig:lint"]
description = "Lint fig modules"
run = "deno lint fig/"

[tasks."fig:check"]
description = "Type-check fig modules"
run = "deno check fig"

[tasks."fig:format"]
description = "Type-check fig modules"
run = "deno fmt fig"

[tasks."fig:verify"]
description = "Run fig check, lint, and tests"
depends = ["fig:check", "fig:lint", "fig:test"]

[tasks."fig"]
description = "Run all fig:* tasks"
depends = ["fig:*"]

[tasks."aspects:setup"]
description = "One-time machine bootstrap: wire age key to sops default location"
run = """
#!/usr/bin/env bash
if [[ -f "${HOME}/.config/mise/age.txt" ]]; then
  mkdir -p "${HOME}/.config/sops/age"
  ln -sf "${HOME}/.config/mise/age.txt" "${HOME}/.config/sops/age/keys.txt"
  echo "sops age key linked"
else
  echo "skipping: ${HOME}/.config/mise/age.txt not found"
fi
"""

[tasks."arch:test-container"]
description = "Start ephemeral Arch test container with dotfiles bind-mounted"
run = """
sudo systemd-nspawn \
  --ephemeral \
  --bind=$HOME/.dotfiles:/root/.dotfiles \
  --bind-ro=$HOME/.config/mise/age.txt:/root/.config/mise/age.txt \
  --bind-ro=/dev/null:/run/fig-test-container \
  -bD /var/lib/machines/arch
"""

[tasks."aspects:check"]
description = "Type-check fig modules"
run = "deno check aspects/**/*.ts"
