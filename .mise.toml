experimental_monorepo_root = true

[env]
FIG_IDENTITY = "${FIG_IDENTITY:-namjul}"

[monorepo]
config_roots = [
  "aspects/*",
]

[settings]
sops.rops = false
experimental = true
env_shell_expand = true

[tools]
sops = "latest"
age = "latest"
ghq = "latest"
deno = "latest"
gomplate = "latest"

[tasks."fig:test"]
description = "Run fig tests"
run = "deno test -A"

[tasks."fig:lint"]
description = "Lint fig modules"
run = "deno lint fig/"

[tasks."fig:check"]
description = "Type-check fig modules"
run = "deno check fig"

[tasks."fig:format"]
description = "Type-check fig modules"
run = "deno fmt fig"

[tasks."fig:verify"]
description = "Run fig check, lint, and tests"
depends = ["fig:check", "fig:lint", "fig:test"]

[tasks."fig"]
description = "Run all fig:* tasks"
depends = ["fig:*"]

[tasks."aspects:check"]
description = "Type-check fig modules"
run = "deno check aspects/**/*.ts"
