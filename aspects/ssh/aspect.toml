
["ssh:dir"]
description = "Ensure ~/.ssh directory exists (0700)"
run = "deno run --config=deno.json --allow-all aspects/ssh/index.ts dir"

["ssh:config"]
description = "Install ~/.ssh/config from encrypted aspect file"
run = "deno run --config=deno.json --allow-all aspects/ssh/index.ts config"

["ssh:keys"]
description = "Install SSH keys from key.yml via sops extract"
run = "deno run --config=deno.json --allow-all aspects/ssh/index.ts keys"

[ssh]
description = "Manages local SSH config"
depends = ["ssh:dir", "ssh:config", "ssh:keys"]
