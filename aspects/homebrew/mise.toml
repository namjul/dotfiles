[tasks."update"]
description = "update homebrew"
run = "deno run --allow-all index.ts update"

[tasks."brew:timewarrior"]
description = "brew install timewarrior"
depends = [":update"]
file = "./timewarrior"

[tasks."brew"]
description = "brew install"
depends = [":update", ":brew:timewarrior"]
run = "deno run --allow-all index.ts brew"

[tasks."cleanup"]
description = "cleanup homebrew"
run = "deno run --allow-all index.ts cleanup"

[tasks.default]
description = "Setup homebrew"
depends = [":brew"]
depends_post = [":cleanup"]
