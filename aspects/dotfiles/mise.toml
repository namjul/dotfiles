[env]
_.file = { path = "env.json" }

[tasks."files"]
description = "create symlinks"
run = "./index.ts files"

[tasks."templates"]
description = "fill templates"
run = "./index.ts templates"

[tasks."agents"]
description = "setup agents files"
run = "./index.ts agents"

[tasks.default]
description = "Creates symlinks from the $HOME directory to the dotfiles in this repo."
depends = ["//:aspects:setup", ":files", ":templates", ":agents"]
depends_post = [":tools"]

[tasks."tools"]
description = "Install mise tools and generate shell completions"
run = """
#!/usr/bin/env bash
eval "$(fnox activate bash)"
mise install
mkdir -p ~/.config/fish/completions
mise completion fish > ~/.config/fish/completions/mise.fish
"""
