[env]
FNOX_AGE_KEY_FILE = "~/.config/mise/age.txt"
SOPS_AGE_KEY_FILE = "~/.config/mise/age.txt"

[tools]
deno = "2.5.1"
golang = "1.20"
node = "22.16.0"
lua = "latest"
python = "3.11"
pipx = 'latest'
bun = "latest"
ruby = "latest"
rust = "latest"
zig = "v0.15.2"
usage = "latest"
"github:anomalyco/opencode" = "latest"
age = "latest"
fnox = "latest"
pitchfork = "latest"

[settings]
experimental = false
idiomatic_version_file_enable_tools = []
color_theme = "base16"

[tasks.term]
hide = true
usage = '''
flag "--font-size <font_size>" help="Font size override"
flag "--class <class>" help="Window class / app-id"
flag "--title <title>" help="Window title"
flag "--command <command>" help="Command to run inside the terminal"
'''
run = """
#!/usr/bin/env bash
set -euo pipefail
TERM_BIN="${TERMINAL:-alacritty}"
args=()
case "$TERM_BIN" in
  ghostty)
    [[ -n "${usage_font_size:-}" ]] && args+=("--font-size=${usage_font_size}")
    [[ -n "${usage_class:-}" ]]     && args+=("--class=${usage_class}")
    [[ -n "${usage_title:-}" ]]     && args+=("--title=${usage_title}")
    [[ -n "${usage_command:-}" ]]   && args+=("--command=${usage_command}")
    ;;
  alacritty)
    [[ -n "${usage_font_size:-}" ]] && args+=("-o" "font.size=${usage_font_size}")
    [[ -n "${usage_class:-}" ]]     && args+=("--class" "${usage_class}")
    [[ -n "${usage_title:-}" ]]     && args+=("--title" "${usage_title}")
    [[ -n "${usage_command:-}" ]]   && args+=("-e" "${usage_command}")
    ;;
esac
exec "$TERM_BIN" "${args[@]}" "$@"
"""
