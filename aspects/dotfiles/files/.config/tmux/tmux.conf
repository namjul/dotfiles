#


# %hidden variables are parse-time constants (tmux ‚Č•3.2): they compute once on
# source and are referenced as $NAME in subsequent format strings and commands,
# never appearing in `show-options` output.
%hidden NORMAL=0

# tmux display things in 256 colors
set -ga terminal-overrides ",xterm-256color:Tc"

# Upgrade $TERM
set -g default-terminal "tmux-256color"

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# start tmux only in interactive shell
set-option -g default-command $SHELL

# Focus events enabled for terminals that support them
set -g focus-events on

# command to kill session
bind X kill-session

# switch to an existing session when you close the final window on a session.
set-option -g detach-on-destroy off

set-window-option -g visual-bell on
set-window-option -g bell-action other

set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

set -g allow-passthrough on # allow programs running inside it to directly access the terminal to which tmux itself is attached.

set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# unbind default prefix and set it to space
unbind C-b
set -g prefix C-Space
bind Space send-prefix

bind i run-shell "tmux neww tmux-cht.sh"

bind x kill-pane # skip "kill-pane 1? (y/n)" prompt

# Automatically renumber window numbers on closing a pane (tmux >= 1.7).
set-option -g renumber-windows on

# enable mouse interaction
set -g mouse on

# set vi mode for copy mode
setw -g mode-keys vi

# Begin selection in copy mode.
unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi C-v send -X rectangle-toggle

bind-key [ copy-mode

bind-key o {
  copy-mode
  send-keys -X previous-prompt
}
bind-key -T copy-mode-vi -r o {
  send-keys -X previous-prompt
}
bind-key i {
  copy-mode
  send-keys -X next-prompt
}
bind-key -T copy-mode-vi -r i {
  send-keys -X next-prompt
}

# `C-c`, `Escape`, and `q` exit copy mode.
bind-key -T copy-mode-vi Escape {
  send-keys -X cancel
  set-option -g @mode $NORMAL
}
bind-key -T copy-mode-vi C-c {
  send-keys -X cancel
  set-option -g @mode $NORMAL
}
bind-key -T copy-mode-vi q {
  send-keys -X cancel
  set-option -g @mode $NORMAL
}

# Make "/" and "?" work without going into copy mode first.
bind-key / {
  copy-mode
  command-prompt -i -I "#{pane_search_string}" -T search -p "(search down)" {
    send-keys -X search-forward-incremental "%%"
  }
}
bind-key ? {
  copy-mode
  command-prompt -i -I "#{pane_search_string}" -T search -p "(search up)" {
    send-keys -X search-backward-incremental "%%"
  }
}

# Analagous with naked C-l which resets/clears the terminal.
bind-key C-l clear-history

# Easier and faster switching between next/prev window
bind C-p previous-window
bind C-n next-window

# Copy from tmux buffer to system buffer (clipboard)
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection c"

# Stay in copy mode on drag end.
unbind-key -T copy-mode-vi MouseDragEnd1Pane

# Remove base64 output in xterm type terminals
# https://unix.stackexchange.com/questions/122609/why-does-tmux-copy-operation-always-output-temporary-gibberish-to-the-terminal
set -g set-clipboard off

# Start numbering at 1
set -g base-index 1

# Source .tmux.conf as suggested in `man tmux`
bind R source-file ~/.config/tmux/tmux.conf

# Fast toggle between current and last-used window (normally prefix-l).
bind-key ^space last-window

# Vim-like key bindings for pane navigation (default uses cursor keys).
unbind-key h
bind-key h select-pane -L
unbind-key j
bind-key j select-pane -D
unbind-key k
bind-key k select-pane -U
unbind-key l # normally used for last-window
bind-key l select-pane -R

# split bindings
bind "|" split-window -h -c "#{pane_current_path}"
bind "\\" split-window -fh -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"
bind "_" split-window -fv -c "#{pane_current_path}"
# bind "%" split-window -h -c "#{pane_current_path}"
# bind '"' split-window -v -c "#{pane_current_path}"

# https://github.com/joshmedeski/sesh
bind-key "S" run-shell "sesh connect \"$(sesh list | fzf-tmux -p 80%,70% --no-sort --ansi)\""


# resizing panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Needed so pi can distinguish Enter from Shift/Ctrl+Enter
set -g extended-keys on
set -g extended-keys-format csi-u
set-option -as terminal-features 'xterm*:extkeys'

# open new pane in current path
bind "c" new-window -c "#{pane_current_path}"

# Status bar.
set-option -g status-position top
set-option -g status-left-length 40
set-option -g status-interval 60 # Default is 15.

source-file -q ~/.config/tmux/colors.conf
