[env]
TERM = "xterm-256color"
TERM_PROGRAM = 'alacritty'

[general]
import = [
  "~/.config/alacritty/themes/gruvbox_light.toml"
]

[font]
normal = { family = "JetBrainsMonoNerdFont", style = "Medium" }
bold = { family = "JetBrainsMonoNerdFont", style = "Bold" }
italic = { family = "JetBrainsMonoNerdFont", style = "Italic" }
size = 9

[window]
padding.x = 14
padding.y = 14
decorations = "None"

[keyboard]
bindings = [
{ key = "Insert", mods = "Shift", action = "Paste" },
{ key = "Insert", mods = "Control", action = "Copy" },
{ key = "Return", mods = "Shift", chars = "\u001B\r" }
]


