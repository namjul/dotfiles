[tasks."preflight"]
description = "Verify environment and prepare pacman"
file = 'preflight'

[tasks."packages"]
description = "Install packages via pacman and set up AUR environment (paru)"
depends = [":preflight"]
file = 'packages'

[tasks."login"]
description = "Boot/login stack (omarchy install/login/)"
depends = [":packages"]
run = [
  { task = "default-keyring" },
  { task = "sddm" },
]

[tasks."firewall"]
description = "Set up ufw firewall"
depends = [":packages"]
file = 'firewall'

[tasks."firmware"]
description = "Update firmware via fwupd"
depends = [":packages"]
file = 'firmware'

[tasks.default]
description = "Run all aur tasks"
depends = [":packages", ":login", ":firewall"]

[task_config]
includes = ["login"]
